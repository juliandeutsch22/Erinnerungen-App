# CI — schützt jeden Push: Typen, Tests, Web-Build.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit-Tests
        run: npx jest --ci

      - name: Web-Export
        run: npx expo export --platform web
