# CI — Typen, Tests, Web-Build. Läuft auf main + Pull Requests (nicht auf jedem
# Branch-Push — spart Actions-Minuten; Feature-Branches werden ohnehin per
# Fast-Forward auf main gemergt und dort geprüft).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Überholte Läufe desselben Refs abbrechen (spart Minuten bei schnellen Pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit-Tests
        run: npx jest --ci

      - name: Web-Export
        run: npx expo export --platform web
