# iOS-IPA (unsigniert) — manuell auslösbar (Actions → "iOS IPA" → Run workflow).
# Fahrplan §6 Option B: baut ein UNSIGNIERTES IPA ohne Apple-Developer-Account.
# Signieren + Installieren passiert lokal am PC mit Sideloadly/AltStore und der
# kostenlosen Apple-ID (Personal Team, 7-Tage-Zyklus).
name: iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Erzeugt den ios/-Ordner aus app.json (Config Plugins inklusive).
      # Der Workspace entsteht erst durch `pod install` (nächster Schritt).
      - name: Prebuild (iOS)
        run: |
          set -euxo pipefail
          npx expo prebuild --platform ios --no-install
          ls -la ios/
        env:
          CI: '1'

      # Expos vorkompilierte Module (SDK 54+) + RN-Prebuilts bauen im CI über
      # nested-xcodebuild-Script-Phasen ("Build ExpoModulesJSI xcframework"), die
      # auf GitHub-Runnern reproduzierbar mit Exit 65 fehlschlagen. Alles aus dem
      # Quellcode bauen ist langsamer, aber zuverlässig. Flags landen in
      # Podfile.properties.json und werden vom Podfile respektiert.
      - name: Aus Quellcode bauen (Precompiled Modules aus)
        run: |
          set -euxo pipefail
          node -e '
            const fs = require("fs");
            const p = "ios/Podfile.properties.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j["EXPO_USE_PRECOMPILED_MODULES"] = "false";
            j["ios.buildReactNativeFromSource"] = "true";
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log(j);
          '

      - name: Pods
        working-directory: ios
        run: |
          set -euxo pipefail
          pod --version
          pod install
        env:
          CI: '1'

      - name: Xcode Build (Release, unsigniert)
        run: |
          set -uxo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)
          test -n "$WORKSPACE"
          test -f "$WORKSPACE/contents.xcworkspacedata"
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "===== Fehlerzeilen aus dem Build ====="
            grep -nE "error:|fatal error|Command .* failed|BUILD FAILED" xcodebuild.log | tail -80 || true
            exit "$status"
          fi

      - name: Build-Log sichern (bei Fehlschlag)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

      - name: IPA packen (Payload/*.app → .ipa)
        run: |
          set -euxo pipefail
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)
          test -n "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry stille-unsigned.ipa Payload
          ls -la stille-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: stille-unsigned-ipa
          path: stille-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
