# iOS-IPA (unsigniert) — manuell auslösbar (Actions → "iOS IPA" → Run workflow).
# Fahrplan §6 Option B: baut ein UNSIGNIERTES IPA ohne Apple-Developer-Account.
# Signieren + Installieren passiert lokal am PC mit Sideloadly/AltStore und der
# kostenlosen Apple-ID (Personal Team, 7-Tage-Zyklus).
name: iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Erzeugt den ios/-Ordner aus app.json (Config Plugins inklusive).
      - name: Prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install
        env:
          CI: '1'

      - name: Pods
        run: npx pod-install ios

      - name: Xcode Build (Release, unsigniert)
        run: |
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: IPA packen (Payload/*.app → .ipa)
        run: |
          APP=$(ls -d build/Build/Products/Release-iphoneos/*.app | head -1)
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry stille-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: stille-unsigned-ipa
          path: stille-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
